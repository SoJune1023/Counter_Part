<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI x Polars x Arrow Dashboard</title>
    <link rel="stylesheet" href="/static/css/analyze_post.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/gridjs/dist/theme/mermaid.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/gridjs/dist/gridjs.umd.js"></script>
</head>
<body>
    <div class="container">
        <div class="upload-section">
            <input type="file" id="fileInput" accept=".xlsx, .csv" hidden>
            <label for="fileInput" class="custom-file-upload">파일 선택</label>
            <span id="fileName">선택된 파일 없음</span>
            <button id="uploadBtn" disabled>데이터 분석 시작</button>
        </div>

        <div id="statusText" class="status-bar">파일을 업로드해주세요.</div>

        <div class="content-grid">
            <div class="table-wrapper">
                <div id="grid-table"></div>
            </div>
        </div>
    </div>
    <script type="module" src="/static/js/analyze/analyze_post.js"></script>
</body>
</html>
