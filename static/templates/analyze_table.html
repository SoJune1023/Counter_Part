<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회계 데이터 피벗 툴</title>
    
    <link rel="stylesheet" href="/static/css/analyze_table.css">
</head>
<body>

<div class="container">
    <h2>📊 Pivot Processor</h2>
    <p class="description">회계 데이터를 업로드하면 피벗하여 다운로드합니다.</p>
    
    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" accept=".csv, .xlsx" style="display:none">
        <span id="fileName" class="upload-text">📥 파일을 선택하거나 여기로 드래그하세요</span>
    </div>

    <input type="text" id="accountNameInput" placeholder="계정과목 컬럼명 입력" value="계정과목">

    <button id="uploadBtn" class="btn" disabled>데이터 변환 및 다운로드</button>
    
    <div id="status"></div>
</div>

<script src="/static/js/analyze/accout_table_post.js"></script>
</body>
</html>
